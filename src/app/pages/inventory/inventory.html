<div class="row mx-5 col mt-5">
    <h2>Inventory</h2><hr/>
</div>
<div class="row mx-5">
  <div class="col">
    <label for="productId" class="form-label">Product Id</label>
    <input type="text" class="form-control" id="productId" placeholder="Product Id" aria-label="Product Id">
  </div>
  <div class="col">
    <label for="productName" class="form-label">Product Name</label>
    <input type="text" class="form-control" id="productName" placeholder="Product Name" aria-label="Product Name">
  </div>
  <div class="col">
    <label for="availableStock" class="form-label">Available Stock</label>
    <input type="text" class="form-control" id="availableStock" placeholder="Available Stock" aria-label="Available Stock">
  </div>
  <div class="col">
    <label for="reorderStock" class="form-label">Reorder Stock</label>
    <input type="text" class="form-control" id="reorderStock" placeholder="Reorder Stock" aria-label="Reorder Stock">
  </div>
</div>
<div class="row mx-5 mt-3">
  <div class="col">
    <button type="button" class="btn btn-primary">Submit</button>
  </div>
</div>
<div class="row mx-5 mt-3">
    <H2>Product List</H2>
    <table class="table table-striped table-hover mt-3">
        <thead>
          <tr>
            <th scope="col">Product Id</th>
            <th scope="col">Product Name</th>
            <th scope="col">Available Stock</th>
            <th scope="col">Reorder Stock</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (product of inventoryDto; track product.productId) {
            <tr>
              <td>{{ product.productId }}</td>
              <td>{{ product.productName }}</td>
              <td>{{ product.quantityStock }}</td>
              <td>{{ product.reorderStock }}</td>
              <td>
                <button type="button" class="btn btn-secondary">Edit</button>&nbsp;
                <button type="button" class="btn btn-danger">Delete</button>
              </td>   
            </tr>
          }
        </tbody>
    </table>
</div>
