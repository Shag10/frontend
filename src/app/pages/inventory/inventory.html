<div class="row mx-5 col mt-5">
    <h2>Inventory</h2><hr/>
</div>
<div class="row mx-5">
  <div class="col">
    <label for="productId" class="form-label">Product Id</label>
    <input type="text" class="form-control" id="productId" placeholder="Product Id" aria-label="Product Id" [(ngModel)]="inventoryData.productId" name="productId">
  </div>
  <div class="col">
    <label for="productName" class="form-label">Product Name</label>
    <input type="text" class="form-control" id="productName" placeholder="Product Name" aria-label="Product Name" [(ngModel)]="inventoryData.productName" name="productName">
  </div>
  <div class="col">
    <label for="stockQuantity" class="form-label">Available Stock</label>
    <input type="text" class="form-control" id="stockQuantity" placeholder="Available Stock" aria-label="Available Stock" [(ngModel)]="inventoryData.stockQuantity" name="stockQuantity">
  </div>
  <div class="col">
    <label for="reorderStock" class="form-label">Reorder Stock</label>
    <input type="text" class="form-control" id="reorderStock" placeholder="Reorder Stock" aria-label="Reorder Stock" [(ngModel)]="inventoryData.reorderStock" name="reorderStock">
  </div>
</div>
<div class="row mx-5 mt-3">
  <div class="col">
    <button type="button" class="btn btn-primary" (click)="OnSubmit()">Submit</button>
  </div>
</div>
<div class="row mx-5 mt-3">
    <H2>Product List</H2>
    <table class="table table-striped table-hover mt-3">
        <thead>
          <tr>
            <th scope="col">Product Id</th>
            <th scope="col">Product Name</th>
            <th scope="col">Available Stock</th>
            <th scope="col">Reorder Stock</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody>
            <tr *ngFor="let product of inventoryDto; trackBy: trackByProductId">
              <td>{{ product.ProductId }}</td>
              <td>{{ product.ProductName }}</td>
              <td>{{ product.StockQuantity }}</td>
              <td>{{ product.ReorderStock }}</td>
              <td>
                <button type="button" class="btn btn-primary">Edit</button>&nbsp;
                <button type="button" class="btn btn-danger" (click)="OnDelete(product.ProductId)">Delete</button>
              </td>   
            </tr>
        </tbody>
    </table>
</div>
