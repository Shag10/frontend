<div class="customer-dialog-container">
  <div class="dialog-header">
    <h2 class="dialog-title">Customer Information</h2>
  </div>
  
  <div class="dialog-content">
    <form class="customer-form">
      <div class="form-row">
        <div class="form-group">
          <label for="customerId" class="form-label">Customer ID</label>
          <input type="text" class="form-control" id="customerId" placeholder="Enter customer ID" 
          name="customerId" [(ngModel)]="CustomerData.customerId">
        </div>
        <div class="form-group">
          <label for="customerName" class="form-label">Customer Name</label>
          <input type="text" class="form-control" id="customerName" placeholder="Enter full name" 
          aria-label="Customer Name" name="customerName" [(ngModel)]="CustomerData.customerName">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="Enter email address" 
          aria-label="Email" name="email" [(ngModel)]="CustomerData.email">
        </div>
        <div class="form-group">
          <label for="phoneNumber" class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phoneNumber" placeholder="Enter phone number" 
          aria-label="Phone Number" name="phoneNumber" [(ngModel)]="CustomerData.phoneNumber">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="address" class="form-label">Address</label>
          <input type="text" class="form-control" id="address" placeholder="Enter street address" 
          aria-label="Address" name="address" [(ngModel)]="CustomerData.address">
        </div>
        <div class="form-group">
          <label for="registrationDate" class="form-label">Registration Date</label>
          <input type="date" class="form-control" id="registrationDate" name="registrationDate " 
          [(ngModel)]="CustomerData.registrationDate">
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" (click)="onSubmit()">Save Customer</button>
        <button type="reset" class="btn btn-secondary" (click)="onReset()">Clear</button>
      </div>
    </form>
  </div>
</div>
