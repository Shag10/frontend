<div class="customers-page">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title-block">
      <h1 class="page-title">Customers</h1>
      <p class="page-subtitle">Manage your customer base</p>
    </div>
    <button class="btn-add" (click)="openCustomerDetailsDialog()">
      <span class="btn-icon">+</span> Add Customer
    </button>
  </div>

  <!-- Customer Table Card -->
  <div class="table-card">
    <div class="table-responsive">
      <table class="customer-table">
        <thead>
          <tr>
            <th>Customer ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone Number</th>
            <th>Address</th>
            <th>Registration Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let customer of customerDetialsDto">
            <td>{{ customer.CustomerId }}</td>
            <td>{{ customer.CustomerName }}</td>
            <td>{{ customer.Email }}</td>
            <td>{{ customer.PhoneNumber }}</td>
            <td>{{ customer.Address }}</td>
            <td>{{ customer.RegistrationDate | date:'mediumDate' }}</td>
            <td>
              <div class="action-buttons">
                <button class="action-btn" (click)="OnUpdate(customer)">Edit</button>
                <button class="action-btn danger" (click)="OnDelete(customer.CustomerId)">Delete</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
