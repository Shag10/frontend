<div class="customers-page">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title-block">
      <h1 class="page-title">Customers</h1>
      <p class="page-subtitle">Manage your customer base</p>
    </div>
    <button class="btn-add" (click)="openCustomerDetailsDialog()">
      <span class="btn-icon">+</span> Add Customer
    </button>
  </div>

  <!-- Customer Table Card -->
  <div class="table-card">
    <div class="table-responsive">
      <table class="customer-table">
        <thead>
          <tr>
            <th>Customer ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Registration Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Empty state -->
         
        </tbody>
      </table>
    </div>
  </div>
</div>
