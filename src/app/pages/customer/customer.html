<div class="container" style="margin-top: 70px;">
    <div class="row">
        <button type="button" class="btn btn-primary btn-lg">Add New Customer</button>
    </div>
</div>
<div class="container mt-5">
    <div class="row">
        <div class="col">
            <h2>Customer List</h2><hr/>
        </div>
    </div>
    <div class="row">
        <table class="table table-striped table-hover mt-3">
            <thead>
                <tr>
                    <th scope="col">Customer Id</th>
                    <th scope="col">Customer Name</th>
                    <th scope="col">Email</th>
                    <th scope="col">Phone Number</th>
                    <th scope="col">Address</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let customer of customers; trackBy: trackByCustomerId">
                    <td>{{ customer.CustomerId }}</td>
                    <td>{{ customer.CustomerName }}</td>
                    <td>{{ customer.Email }}</td>
                    <td>{{ customer.PhoneNumber }}</td>
                    <td>{{ customer.Address }}</td>
                    <td>
                        <button type="button" class="btn btn-primary">Edit</button>&nbsp;
                        <button type="button" class="btn btn-danger">Delete</button>
                    </td>   
                </tr>
            </tbody>
        </table>
    </div>
</div>
